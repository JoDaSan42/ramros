name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit -- --coverage
      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/unit/lcov.info
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:integration

  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run compile
      - run: npx vsce package --pre-release
        if: github.ref == 'refs/heads/develop'
      - run: npx vsce package
        if: github.ref == 'refs/heads/main'
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ramros-extension-${{ github.ref_name }}
          path: '*.vsix'

  publish-beta:
    name: Publish Beta (Develop Branch)
    runs-on: ubuntu-latest
    needs: build-extension
    if: github.ref == 'refs/heads/develop'
    environment: beta
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ramros-extension-develop
      - name: Publish Beta to OpenVSX
        run: npx ovsx publish -p ${{ secrets.OVSX_TOKEN }} --pre-release
        continue-on-error: true
      - name: Publish Beta to VS Marketplace
        run: npx vsce publish -p ${{ secrets.VSCE_PAT }} --pre-release
        continue-on-error: true

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-extension
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ramros-extension-main
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: '*.vsix'
      - name: Publish to OpenVSX
        run: npx ovsx publish -p ${{ secrets.OVSX_TOKEN }}
        continue-on-error: true
      - name: Publish to VS Marketplace
        run: npx vsce publish -p ${{ secrets.VSCE_PAT }}
        continue-on-error: true
