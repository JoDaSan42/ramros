name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit --loglevel=error
      - run: npm run lint
      - run: npm run typecheck

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit --loglevel=error
      - run: npm run test:unit -- --coverage
      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/unit/lcov.info
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests (Non-ROS)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit --loglevel=error
      - run: npm run test:ci

  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration]
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit --loglevel=error
      - run: npm run compile
      - name: Determine package type
        id: package-type
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            echo "type=release" >> $GITHUB_OUTPUT
          elif [[ $GITHUB_REF == 'refs/heads/develop' ]]; then
            echo "type=prerelease" >> $GITHUB_OUTPUT
          else
            echo "type=release" >> $GITHUB_OUTPUT
          fi
      - run: npx @vscode/vsce package --pre-release
        if: steps.package-type.outputs.type == 'prerelease'
      - run: npx @vscode/vsce package
        if: steps.package-type.outputs.type == 'release'
      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: ramros-extension
          path: '*.vsix'

  publish-beta:
    name: Publish Beta (Develop Branch)
    runs-on: ubuntu-latest
    needs: build-extension
    if: github.ref == 'refs/heads/develop'
    environment: beta
    steps:
      - uses: actions/checkout@v5
      - name: Download Artifact
        uses: actions/download-artifact@v5
        with:
          name: ramros-extension
      - name: Publish Beta to OpenVSX
        run: npx ovsx publish -p ${{ secrets.OVSX_TOKEN }} --pre-release
        continue-on-error: true
      - name: Publish Beta to VS Marketplace
        run: npx vsce publish -p ${{ secrets.VSCE_PAT }} --pre-release
        continue-on-error: true

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-extension
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v5
      - name: Download Artifact
        uses: actions/download-artifact@v5
        with:
          name: ramros-extension
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: '*.vsix'
      - name: Publish to OpenVSX
        run: npx ovsx publish -p ${{ secrets.OVSX_TOKEN }}
        continue-on-error: true
      - name: Publish to VS Marketplace
        run: npx vsce publish -p ${{ secrets.VSCE_PAT }}
        continue-on-error: true
